name: Actualizar Submódulo Base
on:
  repository_dispatch:
    types: [update-submodule]
  workflow_dispatch: # Permitir botón manual

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Obtener últimos cambios del submódulo
        run: git submodule update --remote --recursive

      - name: Hacer commit y push de los cambios
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          # Comprobamos si hay cambios reales, si los hay hacemos commit
          if git diff --staged --quiet; then
            echo "No hay cambios nuevos en el submódulo"
          else
            git commit -m "Automático: Actualización de plantillas base"
            git push
          fi